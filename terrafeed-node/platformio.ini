; TERRAFEED//NODE — Seeed XIAO ESP32S3 Sense + companion Meshtastic node
;
; No external lib_deps on purpose: esp32-camera, WiFi, HTTPClient, and SD all
; ship with the espressif32 Arduino core. Smaller supply-chain surface.

[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
board_build.arduino.memory_type = qio_opi
build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=2
    -Iinclude
